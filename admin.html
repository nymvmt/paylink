<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paylink Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- ===== HEADER ===== -->
<header id="admin-header" class="hidden sticky top-0 bg-white border-b border-gray-100 z-30">
  <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="show('list')">
      <span id="admin-brand" class="font-bold text-base">-</span>
      <span class="text-xs text-gray-400 border border-gray-200 rounded px-1.5 py-0.5">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <a id="header-shop-link" href="#" target="_blank" class="text-xs text-gray-400 hover:text-gray-700">쇼핑몰 바로가기</a>
      <button onclick="show('setup')" class="text-xs text-gray-400 hover:text-gray-700">브랜드 설정</button>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-gray-700">로그아웃</button>
    </div>
  </div>
</header>

<!-- ===== LOGIN ===== -->
<div id="screen-login" class="hidden max-w-sm mx-auto px-4 py-24 text-center">
  <h1 class="text-2xl font-bold mb-2">Admin</h1>
  <p class="text-sm text-gray-400 mb-10">Google 계정으로 로그인하세요.</p>
  <p id="login-error" class="text-red-500 text-sm mb-4 hidden"></p>
  <button onclick="login()" class="w-full bg-black text-white py-3 rounded-xl text-sm font-semibold hover:bg-gray-800">Google로 로그인</button>
</div>

<!-- ===== BRAND NAME SETUP ===== -->
<div id="screen-setup" class="hidden max-w-sm mx-auto px-4 py-16">
  <h2 class="text-xl font-bold mb-2">브랜드 설정</h2>
  <p class="text-sm text-gray-400 mb-6">고객 페이지 및 하단 사업자 정보에 표시됩니다.</p>
  <div class="space-y-3 mb-3">
    <input id="setup-brand" type="text" placeholder="브랜드명 *" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-owner-name" type="text" placeholder="대표자명" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-business-number" type="text" placeholder="사업자등록번호 (000-00-00000)" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-commerce-number" type="text" placeholder="통신판매업 신고번호" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-address" type="text" placeholder="주소" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-contact-phone" type="tel" placeholder="고객 문의 전화번호" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-instagram" type="text" placeholder="인스타그램 아이디 (@제외)" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-link" type="url" placeholder="기타 링크 (https://...)" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
    <input id="setup-notify-email" type="email" placeholder="주문 알림 이메일" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 bg-white">
  </div>
  <p id="setup-error" class="text-red-500 text-sm mb-3 hidden"></p>
  <button onclick="saveBrandSettings()" class="w-full bg-black text-white py-3 rounded-xl text-sm font-semibold hover:bg-gray-800">저장</button>
</div>

<!-- ===== PRODUCT LIST ===== -->
<div id="screen-list" class="hidden max-w-xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <button onclick="show('list')" class="text-sm font-semibold border-b-2 border-black pb-0.5">상품 목록</button>
      <button onclick="loadOrders()" class="text-sm text-gray-400 hover:text-gray-700 pb-0.5">주문 목록</button>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="copyStoreLink()" class="text-xs border border-gray-200 rounded-xl px-3 py-2 hover:bg-gray-50">스토어 링크</button>
      <button onclick="openEditor(null)" class="bg-black text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-800">+ 새 상품</button>
    </div>
  </div>
  <div id="claim-banner" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 flex items-center justify-between gap-3">
    <p class="text-sm text-amber-800"><span id="claim-count"></span>개의 기존 상품이 연결되지 않았습니다.</p>
    <button onclick="claimProducts()" class="shrink-0 text-xs bg-amber-600 text-white rounded-lg px-3 py-1.5 hover:bg-amber-700">내 계정으로 가져오기</button>
  </div>
  <div id="product-list" class="space-y-3"></div>
</div>

<!-- ===== ORDERS ===== -->
<div id="screen-orders" class="hidden max-w-xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <button onclick="loadList()" class="text-sm text-gray-400 hover:text-gray-700 pb-0.5">상품 목록</button>
      <button onclick="loadOrders()" class="text-sm font-semibold border-b-2 border-black pb-0.5">주문 목록</button>
    </div>
  </div>
  <div id="orders-table" class="overflow-x-auto"></div>
</div>

<!-- ===== EDITOR ===== -->
<div id="screen-editor" class="hidden max-w-xl mx-auto px-4 py-10">
  <div class="mb-6">
    <button onclick="show('list')" class="text-sm text-gray-500 hover:text-gray-800">← 목록으로</button>
  </div>
  <h2 id="editor-title" class="text-xl font-bold mb-6">상품 편집</h2>

  <div class="bg-white rounded-2xl p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">상품명</label>
      <input id="f-name" type="text" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400">
    </div>
    <div class="flex gap-3">
      <div class="flex-1">
        <label class="block text-sm font-medium text-gray-600 mb-1">가격 (원)</label>
        <input id="f-price" type="number" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400">
      </div>
      <div class="flex-1">
        <label class="block text-sm font-medium text-gray-600 mb-1">배송비 (원)</label>
        <input id="f-shipping" type="number" value="4000" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">상품 설명</label>
      <textarea id="f-desc" rows="4" placeholder="상품 설명을 입력하세요." class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400 resize-none"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">사이즈 (쉼표 구분)</label>
      <input id="f-sizes" type="text" placeholder="S, M, L, XL" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">컬러 (쉼표 구분)</label>
      <input id="f-colors" type="text" placeholder="블랙, 화이트, 네이비" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">이미지 (최대 10장)</label>
      <input id="f-images" type="file" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
      <div id="image-preview" class="flex gap-2 mt-3 flex-wrap"></div>
      <div id="existing-images" class="flex gap-2 mt-2 flex-wrap"></div>
    </div>

    <p id="save-error" class="text-red-500 text-sm hidden"></p>
    <p id="save-ok" class="text-green-600 text-sm hidden">저장되었습니다.</p>
    <button onclick="saveProduct()" id="save-btn" class="w-full bg-black text-white py-3 rounded-xl text-sm font-semibold hover:bg-gray-800">저장</button>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer id="site-footer" class="hidden border-t border-gray-100 mt-16 px-4 py-10 text-xs text-gray-400 max-w-xl mx-auto space-y-1.5">
  <p id="footer-brand" class="font-medium text-gray-500"></p>
  <p id="footer-owner"></p>
  <p id="footer-business-number"></p>
  <p id="footer-commerce-number"></p>
  <p id="footer-address"></p>
  <p id="footer-contact"></p>
  <a id="footer-instagram" href="#" target="_blank" rel="noopener" class="hidden text-gray-400 hover:text-gray-600">Instagram</a>
  <a id="footer-link" href="#" target="_blank" rel="noopener" class="hidden text-gray-400 hover:text-gray-600"></a>
</footer>

<script type="module">
  import { AdminApp } from '/js/admin/AdminApp.js';
  const app = new AdminApp();
  app.init();
</script>
</body>
</html>
